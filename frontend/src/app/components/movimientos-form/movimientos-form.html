<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-sm border-0">
        <div class="card-header bg-dark text-white py-3">
          <h5 class="mb-0">Registrar Entrada / Salida</h5>
        </div>
        <div class="card-body p-4">
          <form [formGroup]="movimientoForm" (ngSubmit)="onSubmit()">
            
            <div class="mb-3">
              <label class="form-label fw-bold">Producto</label>
              <select formControlName="id_producto" class="form-select bg-light">
                <option [value]="null" disabled>Seleccione un producto...</option>
                <option *ngFor="let p of productos" [value]="p.id">
                  {{ p.nombre }} (Stock actual: {{ p.stock }})
                </option>
              </select>
            </div>

            <div class="row mb-3">
              <div class="col-6">
                <label class="form-label fw-bold">Tipo</label>
                <select formControlName="tipo" class="form-select bg-light">
                  <option value="entrada">⬆️ Entrada</option>
                  <option value="salida">⬇️ Salida</option>
                </select>
              </div>
              <div class="col-6">
                <label class="form-label fw-bold">Cantidad</label>
                <input type="number" formControlName="cantidad" class="form-control bg-light">
              </div>
            </div>

            <div class="mb-4">
              <label class="form-label fw-bold">Observación (Opcional)</label>
              <textarea formControlName="observacion" class="form-control bg-light" rows="2" placeholder="Ej: Compra a proveedor X"></textarea>
            </div>

            <div class="d-flex gap-2">
              <button type="submit" [disabled]="movimientoForm.invalid || loading" class="btn btn-primary w-100 fw-bold">
                {{ loading ? 'Procesando...' : 'Confirmar Movimiento' }}
              </button>
              <button type="button" routerLink="/movimientos" class="btn btn-outline-secondary">Cancelar</button>
            </div>

          </form>
        </div>
      </div>
    </div>
  </div>
</div>
