<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="h3 mb-0">Inventario de Productos</h2>
    <a routerLink="/nuevo-producto" class="btn btn-primary shadow-sm">
      📦 Agregar Producto
    </a>
  </div>

  <div *ngIf="error" class="alert alert-warning border-0 shadow-sm mb-4">
    ⚠️ {{ error }}
  </div>

  <div class="card shadow-sm border-0 overflow-hidden">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-light text-secondary">
          <tr>
            <th class="ps-4">Producto</th>
            <th>Categoría</th>
            <th>Precio</th>
            <th class="text-center">Stock</th>
            <th class="text-end pe-4">Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngIf="loading">
            <td colspan="5" class="text-center py-5">
              <div class="spinner-border text-primary" role="status"></div>
            </td>
          </tr>

          <tr *ngFor="let p of productos">
            <td class="ps-4">
              <div class="fw-bold text-dark">{{ p.nombre }}</div>
              <small class="text-muted">{{ p.descripcion || 'Sin descripción' }}</small>
            </td>
            <td>
              <span class="badge bg-light text-dark border">{{ p.categoria_nombre }}</span>
            </td>
            <td class="fw-bold text-success">$ {{ p.precio }}</td>
            <td class="text-center">
              <span class="badge rounded-pill px-3" 
                    [ngClass]="p.stock < 5 ? 'bg-danger' : 'bg-info text-dark'">
                {{ p.stock }} uds
              </span>
            </td>
            <td class="text-end pe-4">
              <div class="btn-group shadow-sm">
                <button class="btn btn-sm btn-white border" disabled>✏️</button>
                <button (click)="eliminar(p.id)" class="btn btn-sm btn-white border text-danger">🗑️</button>
              </div>
            </td>
          </tr>

          <tr *ngIf="!loading && productos.length === 0">
            <td colspan="5" class="text-center py-5 text-muted">
              No hay productos registrados. ¡Crea el primero!
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
