<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="h3 mb-0">Gestión de Categorías</h2>
    <button class="btn btn-primary btn-sm" disabled>+ Nueva Categoría</button>
  </div>

  <div *ngIf="loading" class="text-center my-5">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Cargando...</span>
    </div>
    <p class="text-muted mt-2">Cargando categorías...</p>
  </div>

  <div *ngIf="error" class="alert alert-danger" role="alert">
    {{ error }}
  </div>

  <div *ngIf="!loading && !error" class="card shadow-sm border-0">
    <div class="table-responsive">
      <table class="table table-striped table-hover align-middle mb-0">
        <thead class="table-dark">
          <tr>
            <th scope="col" style="width: 10%">ID</th>
            <th scope="col" style="width: 30%">Nombre</th>
            <th scope="col" style="width: 40%">Descripción</th>
            <th scope="col" style="width: 20%" class="text-center">Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngIf="categorias.length === 0">
            <td colspan="4" class="text-center text-muted py-4">
              No hay categorías registradas aún.
            </td>
          </tr>
          
          <tr *ngFor="let cat of categorias">
            <td>{{ cat.id }}</td>
            <td class="fw-bold">{{ cat.nombre }}</td>
            <td>{{ cat.descripcion || 'Sin descripción' }}</td>
            <td class="text-center">
              <button class="btn btn-sm btn-outline-secondary me-2" disabled>Editar</button>
              <button class="btn btn-sm btn-outline-danger" disabled>Borrar</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
