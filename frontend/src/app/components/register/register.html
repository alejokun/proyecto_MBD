<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
  <div class="col-md-5">
    <div class="card shadow-lg border-0 rounded-4">
      <div class="card-body p-5">
        <div class="text-center mb-4">
          <h2 class="fw-bold text-success">Crear Cuenta</h2>
          <p class="text-muted">Únete al sistema de gestión de inventarios</p>
        </div>

        <div *ngIf="errorMsg" class="alert alert-danger py-2 small mb-3">
          {{ errorMsg }}
        </div>

        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
          <div class="mb-3">
            <label class="form-label small fw-bold">Nombre de Usuario</label>
            <input type="text" formControlName="username" class="form-control bg-light" placeholder="Ej: alejokun">
          </div>

          <div class="mb-3">
            <label class="form-label small fw-bold">Correo Electrónico</label>
            <input type="email" formControlName="email" class="form-control bg-light" placeholder="tu@email.com">
          </div>

          <div class="mb-4">
            <label class="form-label small fw-bold">Contraseña</label>
            <input type="password" formControlName="password" class="form-control bg-light" placeholder="Mínimo 6 caracteres">
          </div>

          <button type="submit" [disabled]="registerForm.invalid || loading" class="btn btn-success btn-lg w-100 fw-bold">
            {{ loading ? 'Registrando...' : 'Registrarme' }}
          </button>
        </form>

        <div class="text-center mt-4 border-top pt-3">
          <p class="small text-muted">¿Ya tienes cuenta? <a routerLink="/login" class="text-decoration-none">Inicia sesión</a></p>
        </div>
      </div>
    </div>
  </div>
</div>
