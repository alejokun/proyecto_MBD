<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold"><i class="bi bi-database-check"></i> Monitoreo SQL Real-Time</h2>
  </div>

  <div class="card shadow-sm border-0 rounded-4 overflow-hidden">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-dark">
          <tr>
            <th class="ps-4">ID</th>
            <th>Fecha</th>
            <th>Método</th>
            <th>Ruta</th>
            <th>Usuario</th>
            <th class="text-center">Tiempo</th>
            <th class="pe-4">Query SQL</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let c of consultas">
            <td class="ps-4 text-muted small">#{{ c.id }}</td>
            <td class="small">{{ c.fecha | date:'HH:mm:ss' }}</td>
            <td>
              <span class="badge rounded-pill" [ngClass]="getMetodoClass(c.metodo)">{{ c.metodo }}</span>
            </td>
            <td class="small text-truncate" style="max-width: 150px;">{{ c.ruta }}</td>
            <td class="fw-bold">{{ c.usuario_nombre }}</td>
            <td class="text-center">
              <span [class.text-danger]="+c.tiempo_ejecucion > 0.050" class="fw-bold">
                {{ c.tiempo_ejecucion }} ms
              </span>
            </td>
            <td class="pe-4">
              <div class="p-2 bg-light rounded-3 border text-dark overflow-auto" style="max-height: 60px; font-family: monospace; font-size: 0.75rem;">
                {{ c.consulta_sql }}
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
