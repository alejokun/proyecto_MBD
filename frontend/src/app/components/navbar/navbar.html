<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm py-3 mb-4">

    <a class="navbar-brand d-flex align-items-center fw-bold text-uppercase tracking-wider" routerLink="/dashboard">
      <span class="text-primary me-2">📦</span> MBD Inventario
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0" *ngIf="isLoggedIn">
        <li class="nav-item"><a class="nav-link px-3" routerLink="/dashboard" routerLinkActive="active text-primary">Panel</a></li>
        <li class="nav-item"><a class="nav-link px-3" routerLink="/productos" routerLinkActive="active text-primary">Productos</a></li>

        </li>
      </ul>
