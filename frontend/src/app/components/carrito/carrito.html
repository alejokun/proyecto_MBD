<div class="container mt-5">
  <div class="card shadow-sm border-0">
    <div class="card-body p-4">
      <h3 class="fw-bold mb-4">
        <i class="bi bi-cart3 text-primary"></i> Mi Solicitud de Productos
      </h3>
      
      <div *ngIf="items.length === 0" class="text-center py-5">
        <i class="bi bi-cart-x fs-1 text-muted"></i>
        <p class="mt-3 text-muted">No has agregado productos a tu solicitud.</p>
        <a routerLink="/" class="btn btn-outline-primary rounded-pill">Ir al Catálogo</a>
      </div>

      <div *ngIf="items.length > 0">
        <div class="table-responsive">
          <table class="table align-middle">
            <thead class="table-light">
              <tr>
                <th>Producto</th>
                <th class="text-center">Cantidad</th>
                <th class="text-end">Acción</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let item of items">
                <td>
                  <span class="fw-bold text-dark">{{ item.nombre }}</span><br>
                  <small class="text-muted">ID: #{{ item.id }}</small>
                </td>
                <td class="text-center" style="width: 120px;">
                  <input type="number" class="form-control form-control-sm text-center" 
                         [(ngModel)]="item.cantidad" (change)="guardar()" min="1">
                </td>
                <td class="text-end">
                  <button class="btn btn-sm btn-outline-danger border-0" (click)="eliminarItem(item.id)">
                    <i class="bi bi-trash"></i>
                  </button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="d-flex justify-content-between align-items-center mt-4">
          <button class="btn btn-link text-danger text-decoration-none btn-sm" (click)="vaciarCarrito()">
            <i class="bi bi-x-circle me-1"></i> Eliminar todo
          </button>
          
          <button class="btn btn-primary px-5 rounded-pill shadow-sm" (click)="enviarSolicitud()">
            Enviar Solicitud
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
