<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
  <div class="col-md-4">
    <div class="card shadow-lg border-0 rounded-4">
      <div class="card-body p-5">
        <div class="text-center mb-4">
          <h2 class="fw-bold text-primary">¡Bienvenido!</h2>
          <p class="text-muted">Ingresa tus credenciales para continuar</p>
        </div>

        <div *ngIf="errorMsg" class="alert alert-danger small py-2 mb-3">
          {{ errorMsg }}
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
          <div class="mb-3">
            <label class="form-label small fw-bold">Usuario</label>
            <input type="text" formControlName="username" class="form-control form-control-lg bg-light" placeholder="admin">
          </div>

          <div class="mb-4">
            <label class="form-label small fw-bold">Contraseña</label>
            <input type="password" formControlName="password" class="form-control form-control-lg bg-light" placeholder="••••••">
          </div>

          <button type="submit" [disabled]="loginForm.invalid || loading" class="btn btn-primary btn-lg w-100 fw-bold">
            {{ loading ? 'Ingresando...' : 'Iniciar Sesión' }}
          </button>
        </form>

        <div class="text-center mt-4">
          <p class="small text-muted">¿No tienes cuenta? <a routerLink="/register" class="text-decoration-none">Regístrate aquí</a></p>
        </div>
      </div>
    </div>
  </div>
</div>
